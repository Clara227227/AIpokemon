      normal: 'ノーマル', fire: 'ほのお', water: 'みず', grass: 'くさ', electric: 'でんき',
      ice: 'こおり', fighting: 'かくとう', poison: 'どく', ground: 'じめん', flying: 'ひこう',

      dark: 'あく', steel: 'はがね', fairy: 'フェアリー'
    };

    const moveCache = {};

    function addLog(msg, type = '') {
      const logs = document.getElementById('logs');
      const div = document.createElement('div');
      div.className = 'log-entry ' + type;
      div.textContent = msg;
      logs.appendChild(div);
      logs.scrollTop = logs.scrollHeight;
    }

    function getPokeApiName(name, types, isMega) {
      let n = name.toLowerCase().trim().replace(/\\s+/g, '-').replace(/[^a-z0-9-]/g, '');
      
      // Megas mapping
      if (isMega) {
        if (n.startsWith('mega-')) {
          n = n.replace('mega-', '');
        }
        if (n === 'charizard-x') return 'charizard-mega-x';
        if (n === 'charizard-y') return 'charizard-mega-y';
        return n + '-mega';
      }

      // Regional forms mapping
      if (n === 'raichu' && types.includes('psychic')) return 'raichu-alola';
      if (n === 'ninetales' && types.includes('ice')) return 'ninetales-alola';
      if (n === 'arcanine' && types.includes('rock')) return 'arcanine-hisui';
      if (n === 'slowbro' && types.includes('poison')) return 'slowbro-galar';
      if (n === 'slowking' && types.includes('poison')) return 'slowking-galar';
      if (n === 'samurott' && types.includes('dark')) return 'samurott-hisui';
      if (n === 'zoroark' && types.includes('ghost')) return 'zoroark-hisui';
      if (n === 'stunfisk' && types.includes('steel')) return 'stunfisk-galar';
      if (n === 'goodra' && types.includes('steel')) return 'goodra-hisui';
      if (n === 'avalugg' && types.includes('rock')) return 'avalugg-hisui';
      if (n === 'decidueye' && types.includes('fighting')) return 'decidueye-hisui';
      if (n === 'tauros') {
        if (types.length === 1 && types[0] === 'fighting') return 'tauros-paldea-combat-breed';
        if (types.includes('fire')) return 'tauros-paldea-blaze-breed';
        if (types.includes('water')) return 'tauros-paldea-aqua-breed';
      }
      
      // Special mappings
      if (n === 'mr-rime') return 'mr-rime';
      if (n === 'basculegion') return 'basculegion-male';
      if (n === 'overqwil') return 'overqwil';
      if (n === 'sneasler') return 'sneasler';
      if (n === 'wyrdeer') return 'wyrdeer';
      if (n === 'kleavor') return 'kleavor';
      
      return n;
    }

    async function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function fetchMoveName(url) {
      if (moveCache[url]) return moveCache[url];
      try {
        const res = await fetch(url);
        if (res.ok) {
          const data = await res.json();
          const jaName = data.names.find(n => n.language.name === 'ja');
          if (jaName) {
            moveCache[url] = jaName.name;
            return jaName.name;
          }
        }
      } catch (e) {
        // ignore
      }
      return null;
    }

    async function scrapePokemon(item, index) {
      const isMega = !!item.isMega;
      const apiName = getPokeApiName(item.name, item.types, isMega);
      let data = null;
      let speciesData = null;

      addLog([\/\] Fetching \ (\)...);

      try {
        const res = await fetch(https://pokeapi.co/api/v2/pokemon/\);
        if (!res.ok) {
          throw new Error(Failed to fetch main data for \ (Status: \));
        }
        data = await res.json();
      } catch (e) {
        addLog(Error fetching \: \. Trying fallback to base form..., 'error');
        // Fallback for custom/unreleased megas
        if (isMega) {
          try {
            const baseName = item.name.replace('Mega ', '').toLowerCase();
            const fallbackRes = await fetch(https://pokeapi.co/api/v2/pokemon/\);
            if (fallbackRes.ok) {
              data = await fallbackRes.json();
              addLog(Successfully fell back to base form for \, 'success');
            }
          } catch (err) {
            // ignore
          }
        }
      }

      if (!data) {
        addLog(Could not retrieve data for \. Skipping..., 'error');
        return null;
      }

      // Try fetching species for Japanese name
      let jaName = item.name;
      try {
        const speciesUrl = data.species.url;
        const sRes = await fetch(speciesUrl);
        if (sRes.ok) {
          speciesData = await sRes.json();
          const jaNameObj = speciesData.names.find(n => n.language.name === 'ja');
          if (jaNameObj) {
            jaName = jaNameObj.name;
          }
        }
      } catch (e) {
        // ignore
      }

      // Format Japanese name for forms/megas
      if (isMega) {
        if (item.name.includes('Mega Charizard X')) {
          jaName = 'メガリザードンX';
        } else if (item.name.includes('Mega Charizard Y')) {
          jaName = 'メガリザードンY';
        } else {
          jaName = 'メガ' + jaName;
        }
      } else {
        // Form suffixes
        if (apiName.endsWith('-alola')) jaName += '(アローラ)';
        else if (apiName.endsWith('-hisui')) jaName += '(ヒスイ)';
        else if (apiName.endsWith('-galar')) jaName += '(ガラル)';
        else if (apiName.includes('-paldea')) {
          if (apiName.includes('-blaze')) jaName += '(パルデア・ほのお)';
          else if (apiName.includes('-aqua')) jaName += '(パルデア・みず)';
          else jaName += '(パルデア)';
        }
      }

      // Extract stats
      const stats = [0, 0, 0, 0, 0, 0];
      data.stats.forEach(s => {
        switch (s.stat.name) {
          case 'hp': stats[0] = s.base_stat; break;
          case 'attack': stats[1] = s.base_stat; break;
          case 'defense': stats[2] = s.base_stat; break;
          case 'special-attack': stats[3] = s.base_stat; break;
          case 'special-defense': stats[4] = s.base_stat; break;
          case 'speed': stats[5] = s.base_stat; break;
        }
      });

      // If it's a fallback mega, manually adjust stats (+100 standard mega boost)
      if (isMega && !apiName.endsWith('-mega') && data.name === apiName.replace('-mega', '')) {
        // Mega stats boost fallback
        stats[1] += 30; // Atk
        stats[2] += 20; // Def
        stats[3] += 30; // SpA
        stats[4] += 10; // SpD
        stats[5] += 10; // Spe
      }

      // Fetch moves names
      const moves = [];
      const movePromises = data.moves.slice(0, 10).map(async (m) => {
        return fetchMoveName(m.move.url);
      });
      const resolvedMoves = await Promise.all(movePromises);
      const uniqueMoves = [...new Set(resolvedMoves)].filter(Boolean);

      // Determine role
      let role = '物理アタッカー';
      const hp = stats[0], atk = stats[1], def = stats[2], spatk = stats[3], spdef = stats[4], spd = stats[5];
      if (def > 105 || spdef > 105 || (hp > 100 && (def > 90 || spdef > 90))) {
        role = def >= spdef ? '物理ディフェンダー' : '特殊ディフェンダー';
      } else if (spatk > atk) {
        role = '特殊アタッカー';
      }

      addLog(Parsed \ successfully!, 'success');

      return {
        id: data.id,
        name: jaName,
        types: data.types.map(t => t.type.name),
        stats: stats,
        moves: uniqueMoves.slice(0, 6),
        role: role,
        isMega: isMega
      };
    }

    async function run() {
      const results = [];
      for (let i = 0; i < pokemonList.length; i++) {
        document.getElementById('progress').textContent = Scraping: \ / \ (\%);
        const item = pokemonList[i];
        const res = await scrapePokemon(item, i);
        if (res) {
          results.push(res);
        }
        await sleep(50); // Be nice to PokeAPI
      }

      document.getElementById('progress').textContent = 'Scraping Finished! Writing output...';
      const outputText = 'export const INITIAL_POKEMON_DATABASE = ' + JSON.stringify(results, null, 2) + ';';
      document.getElementById('output').value = outputText;
      document.getElementById('progress').textContent = 'Finished!';
      addLog('All done!', 'success');
    }

    window.onload = run;
  </script>
</body>
</html>
